<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0000"/>
      <stop offset="50%" style="stop-color:#3d0000"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <radialGradient id="redglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#cc0000;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="250" rx="280" ry="200" fill="url(#redglow)"/>
  <!-- Disc card design (like game disc packaging) -->
  <!-- Game case outer -->
  <rect x="250" y="80" width="300" height="340" rx="8" fill="#111111" stroke="#cc0000" stroke-width="2"/>
  <!-- Case inner area -->
  <rect x="258" y="88" width="284" height="280" rx="4" fill="#1a0a0a"/>
  <!-- RE logo area - bold text treatment -->
  <rect x="258" y="88" width="284" height="80" rx="4" fill="#cc0000"/>
  <text x="400" y="130" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle" letter-spacing="3">RESIDENT EVIL</text>
  <text x="400" y="155" font-family="Arial Black,sans-serif" font-size="36" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">REQUIEM</text>
  <!-- Tagline -->
  <text x="400" y="200" font-family="Arial,sans-serif" font-size="11" fill="#cc0000" text-anchor="middle" letter-spacing="5">THE FINAL CHAPTER BEGINS</text>
  <!-- Game disc in case -->
  <circle cx="400" cy="290" r="75" fill="#222222" stroke="#444444" stroke-width="1"/>
  <circle cx="400" cy="290" r="55" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
  <circle cx="400" cy="290" r="15" fill="#111" stroke="#555" stroke-width="1"/>
  <!-- Disc shine -->
  <path d="M340 250 Q400 230 460 250" stroke="rgba(255,255,255,0.15)" stroke-width="2" fill="none"/>
  <!-- PEGI + PS5 badges on case -->
  <rect x="266" y="380" width="36" height="36" rx="4" fill="#ee7700" stroke="#cc5500" stroke-width="1"/>
  <text x="284" y="404" font-family="Arial Black,sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">18</text>
  <rect x="310" y="382" width="60" height="32" rx="4" fill="#003087" stroke="#0050cc" stroke-width="1"/>
  <text x="340" y="402" font-family="Arial Black,sans-serif" font-size="12" font-weight="900" fill="white" text-anchor="middle">PS5</text>
  <!-- Title bar -->
  <text x="400" y="58" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="#cc0000" text-anchor="middle" letter-spacing="4">RESIDENT EVIL 9</text>
  <text x="400" y="460" font-family="Arial,sans-serif" font-size="13" fill="#888888" text-anchor="middle">PS5 Edition · Disc + Case · £69.99 RRP</text>
</svg>
