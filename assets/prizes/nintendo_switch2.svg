<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e60012"/>
      <stop offset="100%" style="stop-color:#8b0000"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d0d2b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>
  <!-- Switch 2 console body -->
  <rect x="185" y="145" width="430" height="250" rx="18" fill="#1a1a1a"/>
  <!-- Screen -->
  <rect x="255" y="160" width="290" height="220" rx="6" fill="url(#screen)"/>
  <!-- Screen content - game visual suggestion -->
  <rect x="255" y="160" width="290" height="220" rx="6" fill="none" stroke="#333366" stroke-width="1"/>
  <text x="400" y="265" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="rgba(255,255,255,0.4)" text-anchor="middle">SWITCH 2</text>
  <text x="400" y="290" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.25)" text-anchor="middle">HD DISPLAY</text>
  <!-- Left Joy-Con (red) -->
  <rect x="185" y="145" width="70" height="250" rx="18" fill="#e60012"/>
  <circle cx="220" cy="195" r="18" fill="#cc0010" opacity="0.8"/>
  <circle cx="220" cy="195" r="12" fill="#1a1a1a"/>
  <circle cx="220" cy="305" r="14" fill="#cc0010" opacity="0.6"/>
  <rect x="208" y="295" width="24" height="3" rx="1.5" fill="#ff6666" opacity="0.7"/>
  <rect x="218" y="283" width="3" height="24" rx="1.5" fill="#ff6666" opacity="0.7"/>
  <!-- Right Joy-Con (blue) -->
  <rect x="545" y="145" width="70" height="250" rx="18" fill="#0055ff"/>
  <circle cx="580" cy="195" r="18" fill="#0044cc" opacity="0.8"/>
  <circle cx="580" cy="195" r="12" fill="#1a1a1a"/>
  <!-- ABXY buttons -->
  <circle cx="590" cy="295" r="6" fill="#33cc33"/>
  <circle cx="574" cy="283" r="6" fill="#ffcc00"/>
  <circle cx="590" cy="271" r="6" fill="#cc2200"/>
  <circle cx="606" cy="283" r="6" fill="#0066ff"/>
  <!-- Nintendo branding -->
  <text x="400" y="68" font-family="Arial Black,sans-serif" font-size="40" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">NINTENDO SWITCH 2</text>
  <text x="400" y="96" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="4">CONSOLE + JOY-CON BUNDLE</text>
  <!-- Value -->
  <rect x="300" y="440" width="200" height="34" rx="17" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="400" y="462" font-family="Arial Black,sans-serif" font-size="14" fill="white" text-anchor="middle">£429.99 RRP</text>
</svg>
